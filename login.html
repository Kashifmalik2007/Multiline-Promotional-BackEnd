<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Multiline Promotional</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #081225;
      --bg-card: rgba(15, 32, 67, 0.45);
      --primary: #FF6B00;
      --primary-hover: #E05E00;
      --text-main: #FFFFFF;
      --text-muted: #94A3B8;
      --input-bg: rgba(10, 25, 47, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(255, 107, 0, 0.5);
      --font-display: 'Outfit', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(255, 107, 0, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(10, 25, 47, 0.8) 0px, transparent 50%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Container holding the card */
    .login-container {
      width: 100%;
      max-width: 440px;
      position: relative;
    }

    /* Decorative glowing blobs behind the card */
    .glow-blob {
      position: absolute;
      width: 250px;
      height: 250px;
      background: var(--primary);
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }
    .glow-blob-1 {
      top: -60px;
      left: -60px;
    }
    .glow-blob-2 {
      bottom: -60px;
      right: -60px;
      background: #0A2540;
    }

    /* Login Card structure with glassmorphism */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-area img {
      max-height: 55px;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
    }

    .logo-area h2 {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .logo-area p {
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--text-main);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--border-focus);
      background-color: rgba(10, 25, 47, 0.9);
    }

    /* Beautiful submit button with micro-animation */
    .submit-btn {
      width: 100%;
      background-color: var(--primary);
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(255, 107, 0, 0.25);
      margin-top: 10px;
    }

    .submit-btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(255, 107, 0, 0.35);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      background-color: #4A5568;
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .back-link a:hover {
      color: var(--primary);
    }

    /* Toast Notification system */
    .alert-box {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>

    <div class="login-card">
      <div class="logo-area">
        <img src="/assets/logo.png" alt="Multiline Logo" onerror="this.src='/favicon.png'">
        <h2>Admin Access</h2>
        <p>Please sign in to manage the products catalog</p>
      </div>

      <div class="alert-box" id="errorAlert">
        <svg style="width: 20px; height: 20px; flex-shrink: 0;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <span id="errorMessage">Invalid credentials.</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" class="form-input" placeholder="Enter username" required autofocus autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span>Sign In</span>
          <div class="spinner" id="btnSpinner"></div>
        </button>
      </form>

      <div class="back-link">
        <a href="/">
          <svg style="width: 14px; height: 14px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          Back to website
        </a>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Reset state
      errorAlert.style.display = 'none';
      submitBtn.disabled = true;
      btnSpinner.style.display = 'block';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Success! Redirect to dashboard
          window.location.href = '/admin/dashboard';
        } else {
          // Auth failed
          errorMessage.textContent = data.message || 'Invalid username or password.';
          errorAlert.style.display = 'flex';
          submitBtn.disabled = false;
          btnSpinner.style.display = 'none';
        }
      } catch (err) {
        console.error('Login error:', err);
        errorMessage.textContent = 'Server connection failed. Please try again.';
        errorAlert.style.display = 'flex';
        submitBtn.disabled = false;
        btnSpinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
